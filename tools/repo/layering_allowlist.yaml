# Temporary, tracked layering exceptions for migration.
# Every entry must include a removal task ID and expiry note.
# Every row must point at an open task under tasks/backlog or tasks/active.
exceptions:
  - from: legacy
    to: core
    file_glob: "src/legacy/Asset/**"
    task: "LEGACY-004"
    expires: "until LEGACY-004 deletes src/legacy/Asset/"
    reason: "Temporary legacy layering exception for Asset while hardening preserves strict boundaries for promoted layers."
  - from: legacy
    to: core
    file_glob: "src/legacy/Core/**"
    task: "LEGACY-005"
    expires: "until LEGACY-005 deletes src/legacy/Core/"
    reason: "Temporary legacy layering exception for Core while hardening preserves strict boundaries for promoted layers."
