allowed_root_entries:
  - .claude/
  - .codex/
  - .github/
  - .gitignore
  - .mcp.json
  - AGENTS.md
  - CLAUDE.md
  - README.md
  - CMakeLists.txt
  - CMakePresets.json
  - ara/
  - assets/
  - benchmarks/
  - cmake/
  - docs/
  - lsan.supp
  - methods/
  - research/
  - src/
  - tasks/
  - tests/
  - tools/
  - vcpkg-configuration.json
  - vcpkg.json
ignored_local_entries:
  - .idea/
  - .ruff_cache/
  - Testing/
  - __pycache__/
  - build/
  - build-*/
  - cmake-build-*/
  - external/
  - experimental/
  - imgui.ini
  - third_party/
  - vcpkg_installed/
notes:
  - "Allowed entries are exact tracked repository roots; broad patterns are forbidden."
  - "Ignored local entries are repository-owned names/patterns for disposable build, dependency, editor, and tool state."
  - "Git's global/user ignore configuration is never consulted for root ownership."
