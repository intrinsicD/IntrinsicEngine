  - id: N138
    type: decision
    title: "Keep frame recipe cores fixed with loadable optional parts"
    provenance: user
    timestamp: "2026-06-24T10:26"
    also_depends_on: [N137]
    choice: >
      A renderer frame recipe should have a predefined fixed core owned by the
      renderer, while optional recipe parts are loadable configuration. The
      fixed core defines the renderer's required frame structure, required
      graph nodes, and mandatory output behavior. Loadable recipe data may
      enable, disable, select, or configure optional features, passes, overlays,
      outputs, diagnostics, and tunables that the renderer explicitly supports.
      The per-frame or per-job data itself varies through the paired snapshot
      and its binding intents. This keeps renderer behavior predictable and
      testable while still allowing users and agents to configure optional
      presentation and workflow features without editing renderer code.
    alternatives:
      - "Make the entire renderer frame recipe arbitrary loadable data."
      - "Make all renderer behavior fixed so users cannot configure optional features."
      - "Let loadable recipes redefine mandatory pass structure and output contracts."
      - "Treat data variation and algorithm variation as the same recipe mechanism."
    evidence:
      - "User answer on 2026-06-24: a recipe can contain optional things; these should be loadable; the rest is predefined and fixed; only the data may vary."
      - "AGENTS.md"
    status: resolved
