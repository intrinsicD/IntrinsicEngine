      error, and fatal. Info and warning diagnostics never block by themselves.
      Action_required blocks only the specific activation or publication path
      until the user chooses an action. Error blocks the affected job, lens,
      channel, or publish target but not unrelated viewport work. Fatal blocks
      the whole operation or active snapshot replacement and keeps the previous
      valid state. Every blocking diagnostic must name the blocked scope and
