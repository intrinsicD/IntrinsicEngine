    title: "Define canonical frame pipeline phases and owners"
    provenance: user
    timestamp: "2026-06-23T21:55"
    also_depends_on: [N94, N99, N118, N126]
    choice: >
      The canonical frame pipeline should use fixed phases: collect intents,
      resolve project state, extract an immutable render world, validate and
      complete the snapshot, build a GPU-ready snapshot, upload and lease
      resources, compile the pass graph, execute render passes, and
      present/capture/report outcomes. App/UI express intent through runtime
      commands; runtime owns project-state resolution, snapshot extraction,
      validation orchestration, scheduling, and outcome publication; lower
      layers execute fallback generation and validation kernels; graphics
      assets and renderer convert immutable snapshot handles into upload plans,
      GPU-resource requirements, and pass graphs; graphics backends execute
      uploads and passes through RHI/Vulkan contracts; UI displays runtime
      diagnostics and explicit job outcomes. Graphics must never pull from live
      ECS, live assets, or UI state.
    alternatives:
