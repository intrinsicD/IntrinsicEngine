name: ci-vulkan

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-vulkan:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            mesa-vulkan-drivers \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools \
            xvfb

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (ci-vulkan preset)
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci-vulkan preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 20 \
            --json-out build/ci-vulkan/ci-timing/phases/configure.json \
            -- cmake --preset ci-vulkan

      - name: Build promoted Vulkan targets
        run: |
          python3 tools/ci/time_command.py \
            --label "Build promoted Vulkan targets" \
            --json-out build/ci-vulkan/ci-timing/phases/build.json \
            -- cmake --build --preset ci-vulkan --target ExtrinsicSandbox IntrinsicGpuVulkanTests

      # GRAPHICS-080: `ctest -L 'gpu' -L 'vulkan'` is the documented intersection
      # form across labels (each `-L` regex must match at least one label). The
      # additional `-LE 'slow|flaky-quarantine'` exclusion narrows the gate to
      # the actual gpu;vulkan smoke fixtures and keeps the broad
      # `IntrinsicRuntimeTests` aggregate (plus its grouped entries) off the
      # PR-time path: those targets are labelled `gpu vulkan slow` by
      # `tests/CMakeLists.txt` because, per HARDEN-041, they still mix CPU-side
      # runtime contracts with Vulkan-backed headless tests. Once HARDEN-041
      # splits the labels we can drop the `slow` exclusion here. On runners
      # without a Vulkan device the remaining smoke fixtures self-skip via
      # `GTEST_SKIP` and the runtime fallback breadcrumb fires — the gate passes
      # as long as no fixture fails. BUG-064 runs the sandbox frame-pacing
      # capture separately under Xvfb and Mesa's lavapipe software Vulkan
      # implementation because that process must execute operational renderer
      # frames before it can emit a diagnostic report. The software driver is
      # scoped to that capture; the remaining smoke fixtures retain their
      # capability-skip behavior. `--no-tests=ignore` keeps this batch green if
      # a future host build trims the fixture set to empty.
      - name: Run gpu;vulkan opt-in fixtures
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci-vulkan \
            --inventory build/ci-vulkan/test-inventories/IntrinsicGpuVulkanTests.txt
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci-vulkan \
            --targets ExtrinsicSandbox
          python3 tools/ci/time_command.py \
            --label "Run gpu;vulkan opt-in fixtures" \
            --json-out build/ci-vulkan/ci-timing/phases/test.json \
            -- ctest --test-dir build/ci-vulkan --output-on-failure -L "gpu" -L "vulkan" -LE "slow|flaky-quarantine" -E "^ExtrinsicSandbox\\.FramePacingDiagnosticCapture$" --no-tests=ignore --timeout 120 -j$(nproc)

      - name: Run frame-pacing capture under virtual display
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          VK_DRIVER_FILES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          test -r "$VK_DRIVER_FILES"
          python3 tools/ci/time_command.py \
            --label "Run frame-pacing capture under virtual display" \
            --json-out build/ci-vulkan/ci-timing/phases/test_frame_pacing.json \
            -- xvfb-run -a --server-args="-screen 0 1280x720x24" \
              ctest --test-dir build/ci-vulkan --output-on-failure \
                -R "^ExtrinsicSandbox\\.FramePacingDiagnosticCapture$" \
                -L "gpu" -L "vulkan" --no-tests=error --timeout 180

      - name: Aggregate gate timing result
        if: always()
        run: |
          context_args=()
          if gpu_tests="$(ctest --test-dir build/ci-vulkan --show-only=json-v1 -L "gpu" -L "vulkan" -LE "slow|flaky-quarantine" -E "^ExtrinsicSandbox\\.FramePacingDiagnosticCapture$" | python3 -c 'import json, sys; print(len(json.load(sys.stdin).get("tests", [])))')" &&
             frame_pacing_tests="$(ctest --test-dir build/ci-vulkan --show-only=json-v1 -R "^ExtrinsicSandbox\\.FramePacingDiagnosticCapture$" -L "gpu" -L "vulkan" | python3 -c 'import json, sys; print(len(json.load(sys.stdin).get("tests", [])))')"; then
            context_args+=(--selected-test-count "$((gpu_tests + frame_pacing_tests))")
          fi
          if ninja_edges="$(ninja -C build/ci-vulkan -t commands ExtrinsicSandbox IntrinsicGpuVulkanTests | sed '/^[[:space:]]*$/d' | wc -l)"; then
            context_args+=(--ninja-edge-count "$ninja_edges")
          fi
          python3 tools/ci/aggregate_gate_timing.py \
            --configure-json build/ci-vulkan/ci-timing/phases/configure.json \
            --build-json build/ci-vulkan/ci-timing/phases/build.json \
            --test-json build/ci-vulkan/ci-timing/phases/test.json \
            --test-json build/ci-vulkan/ci-timing/phases/test_frame_pacing.json \
            --gate ci-vulkan \
            --preset ci-vulkan \
            --compiler clang-20 \
            --runner-image ubuntu-24.04 \
            --commit '${{ github.sha }}' \
            --cache-state cold \
            --vcpkg-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --job-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            "${context_args[@]}" \
            --output build/ci-vulkan/ci-timing/result/result.json

      - name: Validate gate timing result
        if: always()
        run: python3 tools/benchmark/validate_benchmark_results.py --root build/ci-vulkan/ci-timing/result --strict

      - name: Upload gate timing result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-timing-ci-vulkan
          path: build/ci-vulkan/ci-timing/result/result.json
          if-no-files-found: error
