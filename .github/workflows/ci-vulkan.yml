name: ci-vulkan

on:
  pull_request:
  workflow_dispatch:

jobs:
  ci-vulkan:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (ci-vulkan preset)
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci-vulkan preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 20 \
            -- cmake --preset ci-vulkan

      - name: Build promoted Vulkan targets
        run: cmake --build --preset ci-vulkan --target ExtrinsicSandbox IntrinsicTests

      # GRAPHICS-080: `ctest -L 'gpu' -L 'vulkan'` is the documented intersection
      # form across labels (each `-L` regex must match at least one label). The
      # additional `-LE 'slow|flaky-quarantine'` exclusion narrows the gate to
      # the actual gpu;vulkan smoke fixtures and keeps the broad
      # `IntrinsicRuntimeTests` aggregate (plus its grouped entries) off the
      # PR-time path: those targets are labelled `gpu vulkan slow` by
      # `tests/CMakeLists.txt` because, per HARDEN-041, they still mix CPU-side
      # runtime contracts with Vulkan-backed headless tests. Once HARDEN-041
      # splits the labels we can drop the `slow` exclusion here. On runners
      # without a Vulkan device the remaining smoke fixtures self-skip via
      # `GTEST_SKIP` and the runtime fallback breadcrumb fires — the gate passes
      # as long as no fixture fails. `--no-tests=ignore` keeps the job green if
      # a future host build trims the fixture set to empty.
      - name: Run gpu;vulkan opt-in fixtures
        run: ctest --test-dir build/ci-vulkan --output-on-failure -L "gpu" -L "vulkan" -LE "slow|flaky-quarantine" --no-tests=ignore --timeout 120 -j$(nproc)
