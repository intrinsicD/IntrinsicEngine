name: ci-vulkan

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-vulkan:
    name: vulkan-tests
    if: >-
      github.event_name != 'pull_request' ||
      !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    env:
      VULKAN_READBACK_TEST: GpuReadbackJobGpuSmoke.VulkanTransferReadbackWritesPropertyAndFollowUpUploadsDerivedColor
      VULKAN_OPERATIONAL_TEST_REGEX: '^(ExtrinsicSandbox\.(FramePacingDiagnosticCapture|VulkanShutdownLsanContract)|GpuReadbackJobGpuSmoke\.VulkanTransferReadbackWritesPropertyAndFollowUpUploadsDerivedColor)$'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            mesa-vulkan-drivers \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools \
            xvfb

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (ci-vulkan preset)
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci-vulkan preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 40 \
            --json-out build/ci-vulkan/ci-timing/phases/configure.json \
            -- cmake --preset ci-vulkan --fresh

      - name: Build promoted Vulkan targets
        run: |
          python3 tools/ci/time_command.py \
            --label "Build promoted Vulkan targets" \
            --json-out build/ci-vulkan/ci-timing/phases/build.json \
            -- cmake --build --preset ci-vulkan --target ExtrinsicSandbox IntrinsicGpuVulkanTests IntrinsicRuntimeGpuReadbackSmokeTests IntrinsicGlfwLifecycleLsanProcess

      - name: Reconcile gpu;vulkan test routing
        run: |
          python3 tests/regression/tooling/Test.TestGateRouting.py \
            --build-dir build/ci-vulkan \
            --aggregate IntrinsicGpuVulkanTests

      # BUG-106 gives CPU/mock cases and the real Vulkan readback smoke separate,
      # capability-truthful executables. Repeated `-L` arguments are an
      # intersection. The readback remains `slow`, is built explicitly outside
      # the fast aggregate, and joins the two Sandbox contracts in the
      # operational lavapipe/Xvfb batch below.
      - name: Run gpu;vulkan opt-in fixtures
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci-vulkan \
            --inventory build/ci-vulkan/test-inventories/IntrinsicGpuVulkanTests.txt
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci-vulkan \
            --targets ExtrinsicSandbox IntrinsicRuntimeGpuReadbackSmokeTests IntrinsicGlfwLifecycleLsanProcess
          python3 tools/ci/time_command.py \
            --label "Run gpu;vulkan opt-in fixtures" \
            --json-out build/ci-vulkan/ci-timing/phases/test.json \
            -- ctest --test-dir build/ci-vulkan --output-on-failure -L "gpu" -L "vulkan" -LE "slow|flaky-quarantine" -E "$VULKAN_OPERATIONAL_TEST_REGEX" --no-tests=ignore --timeout 120 -j$(nproc)

      - name: Run operational Vulkan fixtures under virtual display
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          VK_DRIVER_FILES: /usr/share/vulkan/icd.d/lvp_icd.json
        run: |
          test -r "$VK_DRIVER_FILES"
          operational_test_count="$(ctest --test-dir build/ci-vulkan --show-only=json-v1 \
            -R "$VULKAN_OPERATIONAL_TEST_REGEX" \
            -L "gpu" -L "vulkan" \
            | python3 -c 'import json, sys; print(len(json.load(sys.stdin).get("tests", [])))')"
          if [[ "$operational_test_count" -ne 3 ]]; then
            echo "Expected two Sandbox contracts and the readback smoke, found $operational_test_count" >&2
            exit 1
          fi
          operational_junit="${GITHUB_WORKSPACE}/build/ci-vulkan/ci-timing/result/operational-vulkan.junit.xml"
          mkdir -p "$(dirname "$operational_junit")"
          ctest_status=0
          python3 tools/ci/time_command.py \
            --label "Run operational Vulkan fixtures under virtual display" \
            --json-out build/ci-vulkan/ci-timing/phases/test_operational_vulkan.json \
            -- xvfb-run -a --server-args="-screen 0 1280x720x24" \
              ctest --test-dir build/ci-vulkan --output-on-failure \
                -R "$VULKAN_OPERATIONAL_TEST_REGEX" \
                -L "gpu" -L "vulkan" --no-tests=error --timeout 180 \
                --output-junit "$operational_junit" || ctest_status=$?
          python3 - "$operational_junit" <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          junit_path, expected_name = sys.argv[1], os.environ["VULKAN_READBACK_TEST"]
          root = ET.parse(junit_path).getroot()

          def local_name(tag: str) -> str:
              return tag.rsplit("}", 1)[-1]

          matches = [
              case
              for case in root.iter()
              if local_name(case.tag) == "testcase"
              and (
                  case.attrib.get("name") == expected_name
                  or (
                      f"{case.attrib.get('classname', '')}."
                      f"{case.attrib.get('name', '')}"
                  ).strip(".")
                  == expected_name
              )
          ]
          if len(matches) != 1:
              raise SystemExit(
                  f"expected one JUnit result for {expected_name}, found {len(matches)}"
              )

          outcome_tags = {local_name(node.tag) for node in matches[0].iter()}
          status = matches[0].attrib.get("status", "run").lower()
          failed_outcomes = outcome_tags & {"error", "failure", "skipped"}
          if failed_outcomes or status in {
              "disabled",
              "fail",
              "failed",
              "notrun",
              "skipped",
          }:
              raise SystemExit(
                  f"{expected_name} did not pass: "
                  f"status={status}, outcomes={sorted(failed_outcomes)}"
              )
          print(f"Operational JUnit evidence: {expected_name} passed")
          PY
          if [[ "$ctest_status" -ne 0 ]]; then
            echo "Operational Vulkan CTest batch failed with status $ctest_status" >&2
            exit "$ctest_status"
          fi

      - name: Aggregate gate timing result
        if: always()
        run: |
          context_args=()
          if gpu_tests="$(ctest --test-dir build/ci-vulkan --show-only=json-v1 -L "gpu" -L "vulkan" -LE "slow|flaky-quarantine" -E "$VULKAN_OPERATIONAL_TEST_REGEX" | python3 -c 'import json, sys; print(len(json.load(sys.stdin).get("tests", [])))')" &&
             operational_tests="$(ctest --test-dir build/ci-vulkan --show-only=json-v1 -R "$VULKAN_OPERATIONAL_TEST_REGEX" -L "gpu" -L "vulkan" | python3 -c 'import json, sys; print(len(json.load(sys.stdin).get("tests", [])))')"; then
            context_args+=(--selected-test-count "$((gpu_tests + operational_tests))")
          fi
          if ninja_edges="$(ninja -C build/ci-vulkan -t commands ExtrinsicSandbox IntrinsicGpuVulkanTests IntrinsicRuntimeGpuReadbackSmokeTests IntrinsicGlfwLifecycleLsanProcess | sed '/^[[:space:]]*$/d' | wc -l)"; then
            context_args+=(--ninja-edge-count "$ninja_edges")
          fi
          python3 tools/ci/aggregate_gate_timing.py \
            --configure-json build/ci-vulkan/ci-timing/phases/configure.json \
            --build-json build/ci-vulkan/ci-timing/phases/build.json \
            --test-json build/ci-vulkan/ci-timing/phases/test.json \
            --test-json build/ci-vulkan/ci-timing/phases/test_operational_vulkan.json \
            --gate ci-vulkan \
            --preset ci-vulkan \
            --build-dir build/ci-vulkan \
            --compiler clang-20 \
            --sanitizer asan-ubsan \
            --runner-image ubuntu-24.04 \
            --commit '${{ github.sha }}' \
            --cache-state cold \
            --vcpkg-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --job-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            "${context_args[@]}" \
            --output build/ci-vulkan/ci-timing/result/result.json

      - name: Validate gate timing result
        if: always()
        run: python3 tools/benchmark/validate_benchmark_results.py --root build/ci-vulkan/ci-timing/result --strict

      - name: Upload gate timing and operational evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-timing-ci-vulkan
          path: |
            build/ci-vulkan/ci-timing/result/result.json
            build/ci-vulkan/ci-timing/result/operational-vulkan.junit.xml
          if-no-files-found: error

  required-ci-vulkan:
    name: ci-vulkan
    if: always()
    needs: ci-vulkan
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve ci-vulkan lifecycle result
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_DRAFT: ${{ github.event.pull_request.draft || false }}
          VULKAN_RESULT: ${{ needs['ci-vulkan'].result }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" && "$PR_DRAFT" == "true" ]]; then
            if [[ "$VULKAN_RESULT" != "skipped" ]]; then
              echo "::error::Draft Vulkan job resolved as $VULKAN_RESULT"
              exit 1
            fi
            echo "Vulkan confidence skipped for draft pull request"
            exit 0
          fi
          if [[ "$VULKAN_RESULT" != "success" ]]; then
            echo "::error::Vulkan confidence failed with result $VULKAN_RESULT"
            exit 1
          fi
