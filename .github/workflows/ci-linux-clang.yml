name: ci-linux-clang

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      run_sanitizers:
        description: Run the ASan/UBSan matrix and CPU selection parity
        required: false
        default: true
        type: boolean
      collect_test_timing:
        description: Collect five pr-fast, CPU, and CPU-slow timing samples instead of gates
        required: false
        default: false
        type: boolean
      collect_grouped_ctest_evidence:
        description: Collect matched individual/grouped CPU timing and parity evidence
        required: false
        default: false
        type: boolean
      collect_compile_hotspot_evidence:
        description: Collect five clean BUILD-004 compile-hotspot samples
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

jobs:
  reject-conflicting-evidence-inputs:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      ((inputs.collect_test_timing &&
      inputs.collect_grouped_ctest_evidence) ||
      (inputs.collect_test_timing &&
      inputs.collect_compile_hotspot_evidence) ||
      (inputs.collect_grouped_ctest_evidence &&
      inputs.collect_compile_hotspot_evidence))
    runs-on: ubuntu-24.04
    steps:
      - name: Reject conflicting evidence modes
        run: |
          echo "::error::collect_test_timing, collect_grouped_ctest_evidence, and collect_compile_hotspot_evidence are mutually exclusive"
          exit 1

  ci-linux-clang:
    name: full-cpu
    if: >-
      (github.event_name != 'workflow_dispatch' ||
      (!inputs.collect_test_timing &&
      !inputs.collect_grouped_ctest_evidence &&
      !inputs.collect_compile_hotspot_evidence))
      &&
      (github.event_name != 'pull_request' ||
      !github.event.pull_request.draft)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Install Python validation deps
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Enforce task policy
        run: python3 tools/agents/check_task_policy.py --root . --strict

      - name: Configure (ci preset)
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 40 \
            --json-out build/ci/ci-timing/phases/configure.json \
            -- cmake --preset ci --fresh -DINTRINSIC_GROUP_PURE_CTEST=ON

      - name: Validate backend configure determinism
        run: |
          python3 tools/ci/time_command.py \
            --label "Validate backend configure determinism" \
            --json-out build/ci/ci-timing/phases/configure_backend_determinism.json \
            -- python3 tests/regression/tooling/Test.BackendConfigureDeterminism.py

      - name: Build required CPU cohort
        run: |
          python3 tools/ci/time_command.py \
            --label "Build required CPU cohort" \
            --json-out build/ci/ci-timing/phases/build.json \
            -- cmake --build --preset ci --target IntrinsicCpuTests

      - name: Validate layering (strict mode)
        run: python3 tools/repo/check_layering.py --root src --strict

      - name: Reconcile CPU test routing
        run: |
          python3 tests/regression/tooling/Test.TestGateRouting.py \
            --build-dir build/ci \
            --aggregate IntrinsicCpuTests

      - name: Capture CPU test selection
        id: cpu-selection
        run: |
          python3 tools/ci/cpu_test_selection.py capture \
            --build-dir build/ci \
            --preset ci \
            --expected-sanitizer none \
            --output build/ci/test-selection/selection.json

      - name: Run full CPU test suite
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --inventory build/ci/test-inventories/IntrinsicCpuTests.txt
          python3 tools/ci/time_command.py \
            --label "Run full CPU test suite" \
            --json-out build/ci/ci-timing/phases/test.json \
            -- ctest --test-dir build/ci --output-on-failure \
              -LE "gpu|vulkan|slow|flaky-quarantine" \
              --timeout 60 \
              --output-junit reports/cpu.junit.xml \
              --parallel 4

      - name: Compile hotspot benchmark gate
        run: |
          python3 tools/analysis/compile_hotspots.py \
            --build-dir build/ci \
            --top 40 \
            --json-out build/ci/compile_hotspots_report.json \
            --baseline-json tools/analysis/compile_hotspot_baseline.json

      - name: Aggregate gate timing result
        if: always()
        run: |
          context_args=()
          selected_tests='${{ steps.cpu-selection.outputs.selected-test-count }}'
          if [[ "$selected_tests" =~ ^[0-9]+$ ]]; then
            context_args+=(--selected-test-count "$selected_tests")
          fi
          if ninja_edges="$(ninja -C build/ci -t commands | sed '/^[[:space:]]*$/d' | wc -l)"; then
            context_args+=(--ninja-edge-count "$ninja_edges")
          fi
          python3 tools/ci/aggregate_gate_timing.py \
            --configure-json build/ci/ci-timing/phases/configure.json \
            --configure-json build/ci/ci-timing/phases/configure_backend_determinism.json \
            --build-json build/ci/ci-timing/phases/build.json \
            --test-json build/ci/ci-timing/phases/test.json \
            --gate ci-linux-clang \
            --preset ci \
            --build-dir build/ci \
            --compiler clang-20 \
            --sanitizer none \
            --runner-image ubuntu-24.04 \
            --commit '${{ github.sha }}' \
            --cache-state cold \
            --vcpkg-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --job-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            "${context_args[@]}" \
            --output build/ci/ci-timing/result/result.json

      - name: Validate gate timing result
        if: always()
        run: python3 tools/benchmark/validate_benchmark_results.py --root build/ci/ci-timing/result --strict

      - name: Upload gate timing result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-timing-ci-linux-clang
          path: build/ci/ci-timing/result/result.json
          if-no-files-found: error

      - name: Upload CPU test selection
        if: always() && steps.cpu-selection.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ci-cpu-test-selection-ci-linux-clang
          path: build/ci/test-selection/selection.json
          if-no-files-found: error

      - name: Upload CPU test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-cpu-test-results-ci-linux-clang
          path: |
            build/ci/reports/cpu.junit.xml
            build/ci/reports/grouped-ctest/gtest/
          if-no-files-found: warn

  test-timing-profile:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.collect_test_timing &&
      !inputs.collect_grouped_ctest_evidence &&
      !inputs.collect_compile_hotspot_evidence
    name: test-timing-profile (${{ matrix.cohort.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        cohort:
          - name: pr-fast
            preset: ci-fast
            build_dir: build/ci-fast
            aggregate: IntrinsicPrFastTests
          - name: cpu
            preset: ci
            build_dir: build/ci
            aggregate: IntrinsicCpuTests
          - name: cpu-slow
            preset: ci
            build_dir: build/ci
            aggregate: IntrinsicCpuSlowTests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure timing cohort
        run: cmake --preset ${{ matrix.cohort.preset }} --fresh

      - name: Build timing cohort
        run: >-
          cmake --build --preset ${{ matrix.cohort.preset }}
          --target ${{ matrix.cohort.aggregate }}

      - name: Reconcile timing cohort
        run: |
          python3 tests/regression/tooling/Test.TestGateRouting.py \
            --build-dir ${{ matrix.cohort.build_dir }} \
            --aggregate ${{ matrix.cohort.aggregate }}

      - name: Collect five timing samples
        run: |
          python3 tools/ci/collect_test_timing.py \
            --build-dir ${{ matrix.cohort.build_dir }} \
            --cohort ${{ matrix.cohort.name }} \
            --samples 5 \
            --parallel $(nproc) \
            --output ${{ matrix.cohort.build_dir }}/test-timing

      - name: Upload timing profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-timing-${{ matrix.cohort.name }}
          path: ${{ matrix.cohort.build_dir }}/test-timing/
          if-no-files-found: error

  grouped-ctest-evidence:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.collect_grouped_ctest_evidence &&
      !inputs.collect_test_timing &&
      !inputs.collect_compile_hotspot_evidence
    name: grouped-ctest-evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure individual and grouped plans
        run: |
          cmake --preset ci --fresh
          cmake --preset ci \
            -B build/ci-grouped \
            --fresh \
            -DINTRINSIC_GROUP_PURE_CTEST=ON

      - name: Build shared CPU plan
        run: cmake --build --preset ci --target IntrinsicCpuTests

      - name: Materialize grouped binary view
        run: |
          set -euo pipefail
          mkdir -p build/ci-grouped/bin
          existing=$(find build/ci-grouped/bin -type f -print -quit)
          if [[ -n "$existing" ]]; then
            echo "::error::grouped binary destination was not empty after configure: $existing"
            exit 1
          fi

          cp -al build/ci/bin/. build/ci-grouped/bin/
          shared_count=0
          while IFS= read -r target; do
            [[ -n "$target" ]] || continue
            individual="build/ci/bin/$target"
            grouped="build/ci-grouped/bin/$target"
            if [[ ! -f "$individual" || ! -f "$grouped" ]]; then
              echo "::error::missing shared CPU test binary for $target"
              exit 1
            fi
            if [[ ! "$individual" -ef "$grouped" ]]; then
              echo "::error::grouped CPU test binary is not the individual-tree inode: $target"
              exit 1
            fi
            shared_count=$((shared_count + 1))
          done < build/ci/test-inventories/IntrinsicCpuTests.txt
          if [[ "$shared_count" -eq 0 ]]; then
            echo "::error::CPU test inventory was empty"
            exit 1
          fi

      - name: Reconcile and compare registrations
        run: |
          python3 tests/regression/tooling/Test.TestGateRouting.py \
            --build-dir build/ci \
            --aggregate IntrinsicCpuTests
          python3 tests/regression/tooling/Test.TestGateRouting.py \
            --build-dir build/ci-grouped \
            --aggregate IntrinsicCpuTests
          python3 tests/regression/tooling/Test.GroupedCTestParity.py \
            registration \
            --individual-build-dir build/ci \
            --grouped-build-dir build/ci-grouped \
            --output build/ci008-grouped-evidence/registration.json

      - name: Collect five matched pairs at j1, j2, and j4
        run: |
          set -euo pipefail
          evidence_root=build/ci008-grouped-evidence
          for jobs in 1 2 4; do
            for pair_index in 1 2 3 4 5; do
              pair=$(printf '%02d' "$pair_index")
              plans=(individual grouped)
              if (( pair_index % 2 == 0 )); then
                plans=(grouped individual)
              fi

              for plan in "${plans[@]}"; do
                build_dir=build/ci
                if [[ "$plan" == grouped ]]; then
                  build_dir=build/ci-grouped
                fi
                python3 tools/ci/collect_test_timing.py \
                  --build-dir "$build_dir" \
                  --cohort cpu \
                  --samples 1 \
                  --parallel "$jobs" \
                  --output "$evidence_root/j$jobs/pair-$pair/$plan"
              done

              python3 tests/regression/tooling/Test.GroupedCTestParity.py \
                execution \
                --individual-build-dir build/ci \
                --grouped-build-dir build/ci-grouped \
                --individual-junit "$evidence_root/j$jobs/pair-$pair/individual/samples/sample-01.junit.xml" \
                --grouped-junit "$evidence_root/j$jobs/pair-$pair/grouped/samples/sample-01.junit.xml" \
                --grouped-gtest-dir "$evidence_root/j$jobs/pair-$pair/grouped/samples/sample-01.gtest" \
                --output "$evidence_root/j$jobs/pair-$pair/parity.json"
            done
          done

      - name: Upload grouped CTest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci008-grouped-ctest-evidence
          path: build/ci008-grouped-evidence/
          if-no-files-found: warn

  compile-hotspot-evidence:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.collect_compile_hotspot_evidence &&
      !inputs.collect_test_timing &&
      !inputs.collect_grouped_ctest_evidence
    name: compile-hotspot-evidence (sample ${{ matrix.sample }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure clean compile-hotspot sample
        run: cmake --preset ci --fresh -DINTRINSIC_GROUP_PURE_CTEST=ON

      - name: Build required CPU cohort
        run: cmake --build --preset ci --target IntrinsicCpuTests

      - name: Analyze required CPU cohort
        run: |
          python3 tools/analysis/compile_hotspots.py \
            --build-dir build/ci \
            --top 40 \
            --json-out build/ci/build004-evidence/cpu.json

      - name: Build source-complete compile graph
        if: ${{ matrix.sample == 1 }}
        run: cmake --build --preset ci --target IntrinsicTests

      - name: Assert source-complete compile graph
        if: ${{ matrix.sample == 1 }}
        run: |
          python3 tools/analysis/compile_hotspots.py \
            --build-dir build/ci \
            --top 40 \
            --json-out build/ci/build004-evidence/source-complete.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path(
                  "build/ci/build004-evidence/source-complete.json"
              ).read_text(encoding="utf-8")
          )
          expected = {"src", "tests", "methods", "benchmarks"}
          roots = {entry["root"]: entry for entry in report["source_roots"]}
          if set(roots) != expected:
              raise SystemExit(
                  f"source root inventory mismatch: expected {sorted(expected)}, "
                  f"got {sorted(roots)}"
              )
          missing = [
              root
              for root in sorted(expected)
              if not roots[root]["present_in_configured_graph"]
              or not roots[root]["present_in_sampled_build"]
          ]
          if missing:
              raise SystemExit(
                  "source-complete compile graph omitted roots: "
                  + ", ".join(missing)
              )
          PY

      - name: Upload compile-hotspot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build004-compile-hotspot-evidence-sample-${{ matrix.sample }}
          path: build/ci/build004-evidence/
          if-no-files-found: error

  sanitizer-tests:
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' &&
      !github.event.pull_request.draft) ||
      (github.event_name == 'workflow_dispatch' &&
      inputs.run_sanitizers &&
      !inputs.collect_test_timing &&
      !inputs.collect_grouped_ctest_evidence &&
      !inputs.collect_compile_hotspot_evidence)
    uses: ./.github/workflows/ci-sanitizers.yml

  cpu-test-selection-parity:
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' &&
      !github.event.pull_request.draft) ||
      (github.event_name == 'workflow_dispatch' &&
      inputs.run_sanitizers &&
      !inputs.collect_test_timing &&
      !inputs.collect_grouped_ctest_evidence &&
      !inputs.collect_compile_hotspot_evidence)
    needs:
      - ci-linux-clang
      - sanitizer-tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download unsanitized CPU selection
        uses: actions/download-artifact@v4
        with:
          name: ci-cpu-test-selection-ci-linux-clang
          path: build/cpu-test-selection/none

      - name: Download ASan CPU selection
        uses: actions/download-artifact@v4
        with:
          name: ci-cpu-test-selection-asan
          path: build/cpu-test-selection/asan

      - name: Download UBSan CPU selection
        uses: actions/download-artifact@v4
        with:
          name: ci-cpu-test-selection-ubsan
          path: build/cpu-test-selection/ubsan

      - name: Enforce CPU test-selection parity
        run: |
          python3 tools/ci/cpu_test_selection.py compare \
            --report build/cpu-test-selection/none/selection.json \
            --report build/cpu-test-selection/asan/selection.json \
            --report build/cpu-test-selection/ubsan/selection.json \
            --require-sanitizer none \
            --require-sanitizer asan \
            --require-sanitizer ubsan \
            --output build/cpu-test-selection/parity.json

      - name: Upload CPU test-selection parity
        uses: actions/upload-artifact@v4
        with:
          name: ci-cpu-test-selection-parity
          path: build/cpu-test-selection/parity.json
          if-no-files-found: error

  required-ci-linux-clang:
    name: ci-linux-clang
    if: >-
      always() &&
      (github.event_name == 'pull_request' ||
      github.event_name == 'merge_group')
    needs:
      - ci-linux-clang
      - sanitizer-tests
      - cpu-test-selection-parity
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve ci-linux-clang lifecycle result
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_DRAFT: ${{ github.event.pull_request.draft || false }}
          CPU_RESULT: ${{ needs['ci-linux-clang'].result }}
          SANITIZER_RESULT: ${{ needs['sanitizer-tests'].result }}
          PARITY_RESULT: ${{ needs['cpu-test-selection-parity'].result }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" && "$PR_DRAFT" == "true" ]]; then
            for result in "$CPU_RESULT" "$SANITIZER_RESULT" "$PARITY_RESULT"; do
              if [[ "$result" != "skipped" ]]; then
                echo "::error::Draft CPU/sanitizer job resolved as $result"
                exit 1
              fi
            done
            echo "Full CPU and sanitizer confidence skipped for draft pull request"
            exit 0
          fi
          for result in "$CPU_RESULT" "$SANITIZER_RESULT" "$PARITY_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "::error::CPU/sanitizer confidence resolved as $result"
              exit 1
            fi
          done
