name: ci-linux-clang

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  ci-linux-clang:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Install Python validation deps
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Enforce task policy
        run: python3 tools/agents/check_task_policy.py --root . --strict

      - name: Configure (ci preset)
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 10 \
            -- cmake --preset ci

      - name: Build full CPU targets
        run: cmake --build --preset ci

      - name: Compile hotspot benchmark gate
        run: |
          python3 tools/analysis/compile_hotspots.py \
            --build-dir build/ci \
            --top 40 \
            --json-out build/ci/compile_hotspots_report.json \
            --baseline-json tools/analysis/compile_hotspot_baseline.json


      - name: Validate layering (strict mode)
        run: python3 tools/repo/check_layering.py --root src --strict

      - name: Run full CPU test suite
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --skip-undeclared \
            --targets \
              IntrinsicCoreTests \
              IntrinsicECSTests \
              IntrinsicContractBuildTests \
              IntrinsicEcsContractTests \
              IntrinsicGeometryTests \
              IntrinsicAssetUnitTests \
              IntrinsicCoreWrapperUnitTests \
              IntrinsicPlatformTests \
              IntrinsicGraphicsAssetsUnitTests \
              IntrinsicGraphicsRhiCpuUnitTests \
              IntrinsicGraphicsRendererCpuUnitTests \
              IntrinsicGraphicsContractTests \
              IntrinsicGraphicsContractCpuTests \
              IntrinsicRuntimeGraphicsCpuTests
          ctest --test-dir build/ci --output-on-failure -LE "gpu|vulkan|slow|flaky-quarantine" --timeout 60 -j$(nproc)

      - name: SLO performance gate (FrameGraph 2k-node scenario)
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --targets IntrinsicBenchmarkTests
          ./build/ci/bin/IntrinsicBenchmarkTests --gtest_filter=ArchitectureSLO.FrameGraphP95P99BudgetsAt2000Nodes
