name: ci-linux-clang

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  ci-linux-clang:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Enforce task policy
        run: python3 tools/agents/check_task_policy.py --root . --strict

      - name: Configure (ci preset)
        run: cmake --preset ci

      - name: Build full CPU targets
        run: cmake --build --preset ci

      - name: Compile hotspot benchmark gate
        run: |
          python3 tools/analysis/compile_hotspots.py \
            --build-dir build/ci \
            --top 40 \
            --json-out build/ci/compile_hotspots_report.json \
            --baseline-json tools/analysis/compile_hotspot_baseline.json


      - name: Validate layering (strict mode, expected-failure during WORKSHOP-002 window)
        # WORKSHOP-001 made the layering checker module- and CMake-aware,
        # which exposes the pre-existing graphics_rhi -> Extrinsic.Platform.Window
        # edge. WORKSHOP-002 removes that edge; until it lands, the strict
        # run is expected to fail with that specific violation reported.
        # Reverts to an unguarded `python3 tools/repo/check_layering.py
        # --root src --strict` invocation as soon as WORKSHOP-002 lands.
        run: |
          set +e
          out=$(python3 tools/repo/check_layering.py --root src --strict 2>&1)
          status=$?
          printf '%s\n' "$out"
          if [ $status -eq 0 ]; then
            echo "::notice::Layering check is clean — restore unguarded form per WORKSHOP-002."
            exit 0
          fi
          if printf '%s\n' "$out" | grep -q 'Extrinsic\.Platform\.Window'; then
            echo "::notice::Layering check failing on expected WORKSHOP-002 violation (Extrinsic.Platform.Window)."
            exit 0
          fi
          echo "::error::Layering check failed without the expected WORKSHOP-002 violation; investigate." >&2
          exit 1

      - name: Run full CPU test suite
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --skip-undeclared \
            --targets \
              IntrinsicCoreTests \
              IntrinsicECSTests \
              IntrinsicContractBuildTests \
              IntrinsicEcsContractTests \
              IntrinsicGeometryTests \
              IntrinsicAssetUnitTests \
              IntrinsicCoreWrapperUnitTests \
              IntrinsicPlatformTests \
              IntrinsicGraphicsAssetsUnitTests \
              IntrinsicGraphicsRhiCpuUnitTests \
              IntrinsicGraphicsRendererCpuUnitTests \
              IntrinsicGraphicsContractTests \
              IntrinsicGraphicsContractCpuTests \
              IntrinsicRuntimeGraphicsCpuTests
          ctest --test-dir build/ci --output-on-failure -LE "gpu|vulkan|slow|flaky-quarantine" --timeout 60 -j$(nproc)

      - name: SLO performance gate (FrameGraph 2k-node scenario)
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --targets IntrinsicBenchmarkTests
          ./build/ci/bin/IntrinsicBenchmarkTests --gtest_filter=ArchitectureSLO.FrameGraphP95P99BudgetsAt2000Nodes
