name: ci-sanitizers

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-sanitizers-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sanitizer-tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - name: asan
            preset: ci-asan
            build_dir: build/ci-asan
          - name: ubsan
            preset: ci-ubsan
            build_dir: build/ci-ubsan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (${{ matrix.sanitizer.name }})
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (${{ matrix.sanitizer.name }})" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 40 \
            --json-out ${{ matrix.sanitizer.build_dir }}/ci-timing/phases/configure.json \
            -- cmake --preset ${{ matrix.sanitizer.preset }} --fresh -DINTRINSIC_GROUP_PURE_CTEST=ON

      - name: Build IntrinsicCpuTests (${{ matrix.sanitizer.name }})
        run: |
          python3 tools/ci/time_command.py \
            --label "Build IntrinsicCpuTests (${{ matrix.sanitizer.name }})" \
            --json-out ${{ matrix.sanitizer.build_dir }}/ci-timing/phases/build.json \
            -- cmake --build --preset ${{ matrix.sanitizer.preset }} --target IntrinsicCpuTests

      - name: Reconcile CPU test routing (${{ matrix.sanitizer.name }})
        run: |
          python3 tests/regression/tooling/Test.TestGateRouting.py \
            --build-dir ${{ matrix.sanitizer.build_dir }} \
            --aggregate IntrinsicCpuTests

      - name: Capture CPU test selection (${{ matrix.sanitizer.name }})
        id: cpu-selection
        run: |
          python3 tools/ci/cpu_test_selection.py capture \
            --build-dir ${{ matrix.sanitizer.build_dir }} \
            --preset ${{ matrix.sanitizer.preset }} \
            --expected-sanitizer ${{ matrix.sanitizer.name }} \
            --output ${{ matrix.sanitizer.build_dir }}/test-selection/selection.json

      - name: Run selected CPU tests (${{ matrix.sanitizer.name }})
        run: |
          python3 tools/ci/time_command.py \
            --label "Run selected CPU tests (${{ matrix.sanitizer.name }})" \
            --json-out ${{ matrix.sanitizer.build_dir }}/ci-timing/phases/test.json \
            -- ctest --test-dir ${{ matrix.sanitizer.build_dir }} \
              --output-on-failure \
              -LE "gpu|vulkan|slow|flaky-quarantine" \
              --no-tests=error \
              --timeout 60 \
              --output-junit reports/cpu.junit.xml \
              --parallel 1

      - name: Aggregate gate timing result (${{ matrix.sanitizer.name }})
        if: always()
        run: |
          context_args=()
          selected_tests='${{ steps.cpu-selection.outputs.selected-test-count }}'
          if [[ "$selected_tests" =~ ^[0-9]+$ ]]; then
            context_args+=(--selected-test-count "$selected_tests")
          fi
          if ninja_edges="$(ninja -C ${{ matrix.sanitizer.build_dir }} -t commands IntrinsicCpuTests | sed '/^[[:space:]]*$/d' | wc -l)"; then
            context_args+=(--ninja-edge-count "$ninja_edges")
          fi
          python3 tools/ci/aggregate_gate_timing.py \
            --configure-json ${{ matrix.sanitizer.build_dir }}/ci-timing/phases/configure.json \
            --build-json ${{ matrix.sanitizer.build_dir }}/ci-timing/phases/build.json \
            --test-json ${{ matrix.sanitizer.build_dir }}/ci-timing/phases/test.json \
            --gate 'ci-sanitizers-${{ matrix.sanitizer.name }}' \
            --preset ${{ matrix.sanitizer.preset }} \
            --build-dir ${{ matrix.sanitizer.build_dir }} \
            --compiler clang-20 \
            --sanitizer '${{ matrix.sanitizer.name }}' \
            --runner-image ubuntu-24.04 \
            --commit '${{ github.sha }}' \
            --cache-state cold \
            --vcpkg-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --job-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            "${context_args[@]}" \
            --output ${{ matrix.sanitizer.build_dir }}/ci-timing/result/result.json

      - name: Validate gate timing result (${{ matrix.sanitizer.name }})
        if: always()
        run: python3 tools/benchmark/validate_benchmark_results.py --root ${{ matrix.sanitizer.build_dir }}/ci-timing/result --strict

      - name: Upload gate timing result (${{ matrix.sanitizer.name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-timing-ci-sanitizers-${{ matrix.sanitizer.name }}
          path: ${{ matrix.sanitizer.build_dir }}/ci-timing/result/result.json
          if-no-files-found: error

      - name: Upload CPU test selection (${{ matrix.sanitizer.name }})
        if: always() && steps.cpu-selection.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ci-cpu-test-selection-${{ matrix.sanitizer.name }}
          path: ${{ matrix.sanitizer.build_dir }}/test-selection/selection.json
          if-no-files-found: error

      - name: Upload CPU test results (${{ matrix.sanitizer.name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-cpu-test-results-${{ matrix.sanitizer.name }}
          path: |
            ${{ matrix.sanitizer.build_dir }}/reports/cpu.junit.xml
            ${{ matrix.sanitizer.build_dir }}/reports/grouped-ctest/gtest/
          if-no-files-found: warn

      - name: Document skipped categories
        run: |
          echo "GPU-labeled tests are intentionally excluded from sanitizer CI."
          echo "Heavy benchmark/SLO suites remain in dedicated workflows."
