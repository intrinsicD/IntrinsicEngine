name: ci-sanitizers

on:
  pull_request:
  workflow_dispatch:

jobs:
  sanitizer-tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - name: asan
            flag: address
          - name: ubsan
            flag: undefined

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (${{ matrix.sanitizer.name }})
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (${{ matrix.sanitizer.name }})" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 10 \
            -- cmake --preset ci \
            -DINTRINSIC_ENABLE_SANITIZERS=OFF \
            -DCMAKE_CXX_FLAGS_DEBUG="-fsanitize=${{ matrix.sanitizer.flag }} -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS_DEBUG="-fsanitize=${{ matrix.sanitizer.flag }}" \
            -DCMAKE_SHARED_LINKER_FLAGS_DEBUG="-fsanitize=${{ matrix.sanitizer.flag }}"

      - name: Build IntrinsicTests (${{ matrix.sanitizer.name }})
        run: cmake --build --preset ci --target IntrinsicTests

      - name: Run selected CPU tests (${{ matrix.sanitizer.name }})
        run: ctest --test-dir build/ci --output-on-failure -L "unit|contract|integration" -LE "gpu|vulkan|slow|flaky-quarantine" --timeout 60

      - name: Document skipped categories
        run: |
          echo "GPU-labeled tests are intentionally excluded from sanitizer CI."
          echo "Heavy benchmark/SLO suites remain in dedicated workflows."
