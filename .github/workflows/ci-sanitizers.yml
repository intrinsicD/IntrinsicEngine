name: ci-sanitizers

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sanitizer-tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - name: asan
            flag: address
          - name: ubsan
            flag: undefined

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (${{ matrix.sanitizer.name }})
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (${{ matrix.sanitizer.name }})" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 40 \
            --json-out build/ci/ci-timing/phases/configure.json \
            -- cmake --preset ci \
            -DINTRINSIC_ENABLE_SANITIZERS=OFF \
            -DCMAKE_CXX_FLAGS_DEBUG="-fsanitize=${{ matrix.sanitizer.flag }} -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS_DEBUG="-fsanitize=${{ matrix.sanitizer.flag }}" \
            -DCMAKE_SHARED_LINKER_FLAGS_DEBUG="-fsanitize=${{ matrix.sanitizer.flag }}"

      - name: Build IntrinsicTests (${{ matrix.sanitizer.name }})
        run: |
          python3 tools/ci/time_command.py \
            --label "Build IntrinsicTests (${{ matrix.sanitizer.name }})" \
            --json-out build/ci/ci-timing/phases/build.json \
            -- cmake --build --preset ci --target IntrinsicTests

      - name: Run selected CPU tests (${{ matrix.sanitizer.name }})
        run: |
          python3 tools/ci/time_command.py \
            --label "Run selected CPU tests (${{ matrix.sanitizer.name }})" \
            --json-out build/ci/ci-timing/phases/test.json \
            -- ctest --test-dir build/ci --output-on-failure -L "unit|contract|integration" -LE "gpu|vulkan|slow|flaky-quarantine" --timeout 60

      - name: Aggregate gate timing result (${{ matrix.sanitizer.name }})
        if: always()
        run: |
          context_args=()
          if selected_tests="$(ctest --test-dir build/ci --show-only=json-v1 -L "unit|contract|integration" -LE "gpu|vulkan|slow|flaky-quarantine" | python3 -c 'import json, sys; print(len(json.load(sys.stdin).get("tests", [])))')"; then
            context_args+=(--selected-test-count "$selected_tests")
          fi
          if ninja_edges="$(ninja -C build/ci -t commands IntrinsicTests | sed '/^[[:space:]]*$/d' | wc -l)"; then
            context_args+=(--ninja-edge-count "$ninja_edges")
          fi
          python3 tools/ci/aggregate_gate_timing.py \
            --configure-json build/ci/ci-timing/phases/configure.json \
            --build-json build/ci/ci-timing/phases/build.json \
            --test-json build/ci/ci-timing/phases/test.json \
            --gate 'ci-sanitizers-${{ matrix.sanitizer.name }}' \
            --preset ci \
            --compiler clang-20 \
            --sanitizer '${{ matrix.sanitizer.name }}' \
            --runner-image ubuntu-24.04 \
            --commit '${{ github.sha }}' \
            --cache-state cold \
            --vcpkg-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --job-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            "${context_args[@]}" \
            --output build/ci/ci-timing/result/result.json

      - name: Validate gate timing result (${{ matrix.sanitizer.name }})
        if: always()
        run: python3 tools/benchmark/validate_benchmark_results.py --root build/ci/ci-timing/result --strict

      - name: Upload gate timing result (${{ matrix.sanitizer.name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-timing-ci-sanitizers-${{ matrix.sanitizer.name }}
          path: build/ci/ci-timing/result/result.json
          if-no-files-found: error

      - name: Document skipped categories
        run: |
          echo "GPU-labeled tests are intentionally excluded from sanitizer CI."
          echo "Heavy benchmark/SLO suites remain in dedicated workflows."
