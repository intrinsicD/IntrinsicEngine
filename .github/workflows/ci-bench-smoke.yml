name: ci-bench-smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  benchmark-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            python3-yaml

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (ci preset)
        run: cmake --preset ci

      - name: Validate benchmark manifests (strict)
        run: python3 tools/benchmark/validate_benchmark_manifests.py --root benchmarks --strict

      - name: Build benchmark smoke target
        run: cmake --build --preset ci --target IntrinsicBenchmarkSmoke

      - name: Run benchmark smoke runner
        env:
          GIT_COMMIT: ${{ github.sha }}
        run: cmake --build --preset ci --target IntrinsicBenchmarks

      - name: Validate benchmark result JSON
        run: python3 tools/benchmark/validate_benchmark_results.py --root build/ci/benchmark --strict

      - name: Upload benchmark smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-result
          path: build/ci/benchmark/IntrinsicBenchmarkSmoke/result.json
