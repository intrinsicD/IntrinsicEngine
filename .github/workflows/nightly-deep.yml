name: nightly-deep

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      slow_evidence_only:
        description: Build and run only the scheduled ordinary-slow correctness lane
        type: boolean
        default: false

jobs:
  nightly-cpu-deep:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3 \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            spirv-tools

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (ci preset)
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 40 \
            -- cmake --preset ci --fresh

      - name: Build nightly CPU target partitions
        run: |
          targets=(IntrinsicCpuTests IntrinsicCpuSlowTests)
          if [ '${{ inputs.slow_evidence_only }}' = 'true' ]; then
            targets=(IntrinsicCpuSlowTests)
          fi
          cmake --build --preset ci --target "${targets[@]}"

      - name: Reconcile scheduled CPU slow cohort
        run: |
          python3 tests/regression/tooling/Test.TestGateRouting.py \
            --build-dir build/ci \
            --aggregate IntrinsicCpuSlowTests

      - name: Run full CPU test suite
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.slow_evidence_only }}
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --skip-undeclared \
            --targets \
              IntrinsicCoreTests \
              IntrinsicECSTests \
              IntrinsicContractBuildTests \
              IntrinsicEcsContractTests \
              IntrinsicGeometryTests \
              IntrinsicAssetUnitTests \
              IntrinsicCoreWrapperUnitTests \
              IntrinsicPlatformTests \
              IntrinsicGraphicsAssetsUnitTests \
              IntrinsicGraphicsRhiCpuUnitTests \
              IntrinsicGraphicsRendererCpuUnitTests \
              IntrinsicGraphicsContractTests \
              IntrinsicGraphicsContractCpuTests \
              IntrinsicRuntimeGraphicsCpuTests
          ctest --test-dir build/ci --output-on-failure -LE "gpu|vulkan|slow|flaky-quarantine" --timeout 60 -j$(nproc)

      - name: Run scheduled CPU slow correctness cohort
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --inventory build/ci/test-inventories/IntrinsicCpuSlowTests.txt
          mkdir -p build/ci/reports
          ctest --test-dir build/ci --output-on-failure \
            -L "^slow$" \
            -LE "^(benchmark|gpu|slo|vulkan|flaky-quarantine)$" \
            --no-tests=error \
            --timeout 120 \
            --output-junit reports/cpu-slow.junit.xml \
            -j$(nproc)

      - name: Compile hotspot report
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.slow_evidence_only }}
        run: |
          python3 tools/analysis/compile_hotspots.py \
            --build-dir build/ci \
            --top 40 \
            --json-out build/ci/reports/compile_hotspots_report.json \
            --baseline-json tools/analysis/compile_hotspot_baseline.json

      - name: Module fanout report
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.slow_evidence_only }}
        run: |
          python3 tools/analysis/module_fanout.py \
            --root src \
            --out build/ci/reports/module_fanout_report.md

      - name: Build benchmark smoke target
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.slow_evidence_only }}
        run: cmake --build --preset ci --target IntrinsicBenchmarkSmoke

      - name: Run benchmark smoke and selected deep benchmarks
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.slow_evidence_only }}
        env:
          GIT_COMMIT: ${{ github.sha }}
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --targets IntrinsicBenchmarkSmoke
          mkdir -p build/ci/benchmark/nightly
          build/ci/bin/IntrinsicBenchmarkSmoke build/ci/benchmark/nightly/smoke_result.json
          python3 tools/ci/check_prerequisites.py path \
            --path build/ci/benchmark \
            --kind dir \
            --producer-target IntrinsicBenchmarks
          python3 tools/benchmark/validate_benchmark_results.py --root build/ci/benchmark

      - name: Report audit cadence status (non-blocking)
        if: always()
        run: python3 tools/agents/check_audit_cadence.py

      - name: Upload nightly reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-deep-reports
          path: |
            build/ci/reports/compile_hotspots_report.json
            build/ci/reports/module_fanout_report.md
            build/ci/reports/cpu-slow.junit.xml
            build/ci/benchmark/nightly/smoke_result.json
          if-no-files-found: error

  nightly-gpu-optional:
    if: ${{ vars.INTRINSIC_ENABLE_GPU_NIGHTLY == 'true' }}
    runs-on: [self-hosted, linux, gpu]
    timeout-minutes: 60
    needs: nightly-cpu-deep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (ci-vulkan preset)
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci-vulkan preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 40 \
            -- cmake --preset ci-vulkan --fresh

      - name: Build IntrinsicTests for GPU-labeled coverage
        run: cmake --build --preset ci-vulkan --target ExtrinsicSandbox IntrinsicTests

      - name: Run optional GPU tests (self-hosted runner)
        run: ctest --test-dir build/ci-vulkan --output-on-failure -L "gpu" -L "vulkan" --no-tests=error --timeout 120
