name: ci-docs

on:
  pull_request:
  workflow_dispatch:

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python validation deps
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Validate markdown links (strict mode)
        run: python3 tools/docs/check_doc_links.py --root . --strict

      - name: Validate task policy (strict mode)
        run: python3 tools/agents/check_task_policy.py --root . --strict

      - name: Validate task validator regressions
        run: python3 tests/regression/tooling/Test.ValidateTasks.py

      - name: Validate task state links (strict mode)
        run: python3 tools/agents/check_task_state_links.py --root . --strict

      - name: Validate documentation synchronization (strict mode)
        run: |
          base_ref=origin/main
          if [ -n '${{ github.event.pull_request.base.sha }}' ]; then
            base_ref='${{ github.event.pull_request.base.sha }}'
          fi
          python3 tools/docs/check_docs_sync.py \
            --root . \
            --diff-mode \
            --base-ref "$base_ref" \
            --strict

      - name: Validate agent skill mirrors
        run: python3 tools/agents/sync_skills.py --check

      - name: Validate Codex config (strict mode)
        run: python3 tools/agents/check_codex_config.py --root . --strict

      - name: Validate layering allowlist quality
        run: python3 tools/repo/check_layering_allowlist_quality.py --root . --strict

      - name: Validate test taxonomy layout
        run: python3 tools/repo/check_test_layout.py --root . --strict

      - name: Validate method manifests
        run: python3 tools/agents/validate_method_manifests.py --root methods --strict

      - name: Validate benchmark manifests
        run: python3 tools/benchmark/validate_benchmark_manifests.py --root benchmarks --strict



      - name: Validate PR contract template
        run: python3 tools/repo/check_pr_contract.py --root . --mode ci

      - name: Validate workflow file naming policy
        run: python3 tools/ci/check_workflow_names.py --root .github/workflows

      - name: Validate compile-heavy workflow timing policy
        run: python3 tests/regression/tooling/Test.WorkflowConcurrency.py

      - name: Validate structural CI policy regressions
        run: python3 tests/regression/tooling/Test.CheckTaskStateLinks.py

      - name: Validate CI timing and ccache pilot policy
        run: |
          python3 tests/regression/tooling/Test.CiTiming.py
          python3 tests/regression/tooling/Test.CcacheWorkflow.py
          python3 tests/regression/tooling/Test.CcacheModuleInvalidationProbe.py

      - name: Validate test build aggregate policy
        run: |
          python3 tests/regression/tooling/Test.TestBuildAggregates.py
          python3 tests/regression/tooling/Test_CiPrerequisiteGuards.py

      - name: Validate generated module inventory freshness
        run: |
          python3 tools/repo/generate_module_inventory.py --root src --out docs/api/generated/module_inventory.md
          git diff --exit-code docs/api/generated/module_inventory.md

      - name: Validate session brief freshness
        run: python3 tools/agents/generate_session_brief.py --check
