name: ci-docs

on:
  pull_request:
  workflow_dispatch:

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python validation deps
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Validate markdown links (strict mode)
        run: python3 tools/docs/check_doc_links.py --root . --strict

      - name: Validate task policy (strict mode)
        run: python3 tools/agents/check_task_policy.py --root . --strict

      - name: Validate Codex config (strict mode)
        run: python3 tools/agents/check_codex_config.py --root . --strict

      - name: Validate stale src_new references
        run: python3 tools/repo/check_stale_src_new_references.py --root . --strict

      - name: Validate method manifests
        run: python3 tools/agents/validate_method_manifests.py --root methods --strict

      - name: Validate benchmark manifests
        run: python3 tools/benchmark/validate_benchmark_manifests.py --root benchmarks --strict



      - name: Validate PR contract template
        run: python3 tools/repo/check_pr_contract.py --root . --mode ci

      - name: Validate workflow file naming policy
        run: python3 tools/ci/check_workflow_names.py --root .github/workflows

      - name: Validate generated module inventory freshness
        run: |
          python3 tools/repo/generate_module_inventory.py --root src --out docs/api/generated/module_inventory.md
          git diff --exit-code docs/api/generated/module_inventory.md
