name: ci-docs

on:
  pull_request:
  workflow_dispatch:

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate markdown links (warning mode)
        run: python3 tools/docs/check_doc_links.py --root .

      - name: Validate structured tasks
        run: python3 tools/agents/validate_tasks.py --root tasks

      - name: Validate method manifests
        run: python3 tools/agents/validate_method_manifests.py --root methods

      - name: Validate benchmark manifests
        run: python3 tools/benchmark/validate_benchmark_manifests.py --root benchmarks

      - name: Validate generated module inventory freshness
        run: |
          python3 tools/repo/generate_module_inventory.py --root src --out docs/api/generated/module_inventory.md
          git diff --exit-code docs/api/generated/module_inventory.md

      - name: Note strict-mode follow-up
        run: |
          echo "Docs/manifests checks are active; strict docs-link enforcement is tracked by RORG-121."
