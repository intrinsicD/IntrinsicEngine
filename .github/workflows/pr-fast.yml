name: pr-fast

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-fast:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: /tmp/intrinsic-pr-fast-ccache
      CCACHE_CONFIGPATH: /tmp/intrinsic-pr-fast-ccache.conf
      CCACHE_MAXSIZE: 2G
      INTRINSIC_CCACHE_MAXSIZE_DISPLAY: 2.0 GB

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            ccache=4.9.1-1 \
            python3

      - name: Configure ccache pilot
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --set-config=direct_mode=false
          ccache --set-config=depend_mode=false
          ccache --show-config

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (ci preset)
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 20 \
            --json-out build/ci/ci-timing/phases/configure.json \
            -- cmake --preset ci

      - name: Detect configured compiler and cache identity
        id: toolchain
        run: |
          python3 tools/ci/ccache_ci.py configured-identity \
            --build-dir build/ci \
            --expected-sanitizer combined-project-default

      - name: Restore compatible ccache store
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-v1-${{ runner.os }}-${{ runner.arch }}-pr-fast-${{ steps.toolchain.outputs.compiler-key }}-${{ steps.toolchain.outputs.scan-deps-key }}-${{ steps.toolchain.outputs.ccache-key }}-preset-ci-sanitizer-${{ steps.toolchain.outputs.sanitizer }}-${{ hashFiles('.github/workflows/pr-fast.yml', 'CMakeLists.txt', 'CMakePresets.json', 'cmake/**/*.cmake', 'tools/ci/ccache_ci.py', 'tools/ci/ccache_module_invalidation_probe.py', 'tools/setup/bootstrap_vcpkg.sh', 'tools/vcpkg/**', 'vcpkg.json', 'vcpkg-configuration.json') }}-${{ github.sha }}
          restore-keys: |
            ccache-v1-${{ runner.os }}-${{ runner.arch }}-pr-fast-${{ steps.toolchain.outputs.compiler-key }}-${{ steps.toolchain.outputs.scan-deps-key }}-${{ steps.toolchain.outputs.ccache-key }}-preset-ci-sanitizer-${{ steps.toolchain.outputs.sanitizer }}-${{ hashFiles('.github/workflows/pr-fast.yml', 'CMakeLists.txt', 'CMakePresets.json', 'cmake/**/*.cmake', 'tools/ci/ccache_ci.py', 'tools/ci/ccache_module_invalidation_probe.py', 'tools/setup/bootstrap_vcpkg.sh', 'tools/vcpkg/**', 'vcpkg.json', 'vcpkg-configuration.json') }}-

      - name: Validate ccache pilot mode
        run: |
          python3 tools/ci/ccache_ci.py check-config \
            --build-dir build/ci \
            --repo-root . \
            --expected-cache-dir "$CCACHE_DIR" \
            --expected-max-size "$INTRINSIC_CCACHE_MAXSIZE_DISPLAY"

      - name: Run module invalidation ccache probe
        run: |
          python3 tools/ci/ccache_module_invalidation_probe.py \
            --work-dir "$RUNNER_TEMP/intrinsic-ccache-module-probe" \
            --cxx '${{ steps.toolchain.outputs.compiler-path }}' \
            --scan-deps '${{ steps.toolchain.outputs.scan-deps-path }}' \
            --output build/ci/ci-timing/ccache/module-invalidation-probe.json

      - name: Zero ccache stats
        run: ccache --zero-stats

      - name: Build PR-fast test aggregate
        run: |
          python3 tools/ci/time_command.py \
            --label "Build PR-fast test aggregate" \
            --json-out build/ci/ci-timing/phases/build.json \
            -- cmake --build --preset ci --target IntrinsicPrFastTests

      - name: Collect ccache stats
        id: ccache-stats
        if: always()
        run: |
          python3 tools/ci/ccache_ci.py write-stats \
            --output build/ci/ci-timing/ccache/stats.json

      - name: Run unit and contract tests
        run: |
          python3 tools/ci/check_prerequisites.py test-binaries \
            --build-dir build/ci \
            --inventory build/ci/test-inventories/IntrinsicPrFastTests.txt
          python3 tools/ci/time_command.py \
            --label "Run unit and contract tests" \
            --json-out build/ci/ci-timing/phases/test.json \
            -- ctest --test-dir build/ci --output-on-failure -L "unit|contract" -LE "gpu|vulkan|slow|flaky-quarantine" --timeout 60 -j$(nproc)

      - name: Aggregate gate timing result
        if: always()
        run: |
          context_args=()
          cache_state=cold
          if [ -n '${{ steps.ccache-restore.outputs.cache-matched-key }}' ]; then
            cache_state=warm
          fi
          if selected_tests="$(ctest --test-dir build/ci --show-only=json-v1 -L "unit|contract" -LE "gpu|vulkan|slow|flaky-quarantine" | python3 -c 'import json, sys; print(len(json.load(sys.stdin).get("tests", [])))')"; then
            context_args+=(--selected-test-count "$selected_tests")
          fi
          if ninja_edges="$(ninja -C build/ci -t commands IntrinsicPrFastTests | sed '/^[[:space:]]*$/d' | wc -l)"; then
            context_args+=(--ninja-edge-count "$ninja_edges")
          fi
          python3 tools/ci/aggregate_gate_timing.py \
            --configure-json build/ci/ci-timing/phases/configure.json \
            --build-json build/ci/ci-timing/phases/build.json \
            --test-json build/ci/ci-timing/phases/test.json \
            --gate pr-fast \
            --preset ci \
            --compiler '${{ steps.toolchain.outputs.compiler }}' \
            --sanitizer '${{ steps.toolchain.outputs.sanitizer }}' \
            --runner-image ubuntu-24.04 \
            --commit '${{ github.sha }}' \
            --cache-state "$cache_state" \
            --ccache-stats-json build/ci/ci-timing/ccache/stats.json \
            --require-ccache-stats \
            --vcpkg-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --job-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            "${context_args[@]}" \
            --output build/ci/ci-timing/result/result.json

      - name: Validate gate timing result
        if: always()
        run: python3 tools/benchmark/validate_benchmark_results.py --root build/ci/ci-timing/result --strict

      - name: Upload gate timing result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-timing-pr-fast
          path: build/ci/ci-timing/result/result.json
          if-no-files-found: error

      - name: Upload module invalidation probe result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-ccache-module-invalidation-pr-fast
          path: build/ci/ci-timing/ccache/module-invalidation-probe.json
          if-no-files-found: error

      - name: Install Python validation deps
        run: python3 -m pip install --disable-pip-version-check pyyaml

      - name: Validate kernel-convergence checker regressions
        run: python3 tests/regression/tooling/Test.CheckKernelConvergence.py

      - name: Validate kernel convergence (strict mode)
        run: python3 tools/repo/check_kernel_convergence.py --root . --strict

      - name: Validate task policy (strict mode)
        run: python3 tools/agents/check_task_policy.py --root . --strict

      - name: Validate docs links (warning mode)
        run: python3 tools/docs/check_doc_links.py --root .

      - name: Validate layering (strict mode)
        run: python3 tools/repo/check_layering.py --root src --strict

      - name: Save validated ccache store
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}
