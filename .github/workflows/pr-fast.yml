name: pr-fast

on:
  pull_request:
  workflow_dispatch:

jobs:
  pr-fast:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            python3

      - name: Configure (ci preset)
        run: cmake --preset ci

      - name: Build IntrinsicTests target
        run: cmake --build --preset ci --target IntrinsicTests

      - name: Run unit and contract tests
        run: ctest --test-dir build/ci --output-on-failure -L "unit|contract" -LE "gpu|vulkan|slow|flaky-quarantine" --timeout 60 -j$(nproc)

      - name: Validate task policy (strict mode)
        run: python3 tools/agents/check_task_policy.py --root . --strict

      - name: Validate docs links (warning mode)
        run: python3 tools/docs/check_doc_links.py --root .

      - name: Validate layering (strict mode, expected-failure during WORKSHOP-002 window)
        # WORKSHOP-001 made the layering checker module- and CMake-aware,
        # which exposes the pre-existing graphics_rhi -> Extrinsic.Platform.Window
        # edge. WORKSHOP-002 removes that edge; until it lands, the strict
        # run is expected to fail with that specific violation reported.
        # Reverts to an unguarded `python3 tools/repo/check_layering.py
        # --root src --strict` invocation as soon as WORKSHOP-002 lands.
        run: |
          set +e
          out=$(python3 tools/repo/check_layering.py --root src --strict 2>&1)
          status=$?
          printf '%s\n' "$out"
          if [ $status -eq 0 ]; then
            echo "::notice::Layering check is clean — restore unguarded form per WORKSHOP-002."
            exit 0
          fi
          if printf '%s\n' "$out" | grep -q 'Extrinsic\.Platform\.Window'; then
            echo "::notice::Layering check failing on expected WORKSHOP-002 violation (Extrinsic.Platform.Window)."
            exit 0
          fi
          echo "::error::Layering check failed without the expected WORKSHOP-002 violation; investigate." >&2
          exit 1
