name: pr-fast

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-fast:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: /tmp/intrinsic-pr-fast-ccache
      CCACHE_CONFIGPATH: /tmp/intrinsic-pr-fast-ccache.conf
      CCACHE_MAXSIZE: 2G
      INTRINSIC_CCACHE_MAXSIZE_DISPLAY: 2.0 GB

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Plan touched scope
        id: route
        shell: bash
        run: |
          base_ref=origin/main
          head_ref=HEAD
          if [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            base_ref='${{ github.event.pull_request.base.sha }}'
            head_ref='${{ github.event.pull_request.head.sha }}'
          fi
          python3 tools/ci/touched_scope.py \
            --root . \
            --action plan \
            --base-ref "$base_ref" \
            --head-ref "$head_ref" \
            --output build/ci-fast/ci-routing/route.json \
            --github-output "$GITHUB_OUTPUT" \
            --step-summary "$GITHUB_STEP_SUMMARY"

      - name: Ensure Python validation dependency
        run: |
          if ! python3 -c 'import yaml' >/dev/null 2>&1; then
            python3 -m pip install --disable-pip-version-check pyyaml
          fi

      - name: Run selected structural checks
        run: |
          python3 tools/ci/touched_scope.py \
            --root . \
            --action structural \
            --plan build/ci-fast/ci-routing/route.json \
            --github-output "$GITHUB_OUTPUT" \
            --step-summary "$GITHUB_STEP_SUMMARY"

      - name: Install system dependencies
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-20 \
            clang-tools-20 \
            ccache=4.9.1-1 \
            python3

      - name: Configure ccache pilot
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --set-config=direct_mode=false
          ccache --set-config=depend_mode=false
          ccache --show-config

      - name: Cache vcpkg binary packages
        id: vcpkg-cache
        if: steps.route.outputs.needs_cpp == 'true'
        uses: actions/cache@v4
        with:
          path: external/vcpkg-bincache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'tools/vcpkg/**', 'tools/setup/bootstrap_vcpkg.sh') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Bootstrap vcpkg
        if: steps.route.outputs.needs_cpp == 'true'
        run: tools/setup/bootstrap_vcpkg.sh

      - name: Enable vcpkg binary cache
        if: steps.route.outputs.needs_cpp == 'true'
        run: echo "VCPKG_BINARY_SOURCES=clear;files,${GITHUB_WORKSPACE}/external/vcpkg-bincache,readwrite" >> "$GITHUB_ENV"

      - name: Configure (ci-fast preset)
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          python3 tools/ci/time_command.py \
            --label "Configure (ci-fast preset)" \
            --warm-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --max-warm-seconds 40 \
            --json-out build/ci-fast/ci-timing/phases/configure.json \
            -- cmake --preset ci-fast --fresh

      - name: Finalize touched scope
        id: finalize
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          python3 tools/ci/touched_scope.py \
            --root . \
            --action finalize \
            --plan build/ci-fast/ci-routing/route.json \
            --build-dir build/ci-fast \
            --github-output "$GITHUB_OUTPUT" \
            --step-summary "$GITHUB_STEP_SUMMARY"

      - name: Detect configured compiler and cache identity
        id: toolchain
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          python3 tools/ci/ccache_ci.py configured-identity \
            --build-dir build/ci-fast \
            --expected-sanitizer none

      - name: Restore compatible ccache store
        id: ccache-restore
        if: steps.route.outputs.needs_cpp == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-v1-${{ runner.os }}-${{ runner.arch }}-pr-fast-${{ steps.toolchain.outputs.compiler-key }}-${{ steps.toolchain.outputs.scan-deps-key }}-${{ steps.toolchain.outputs.ccache-key }}-preset-ci-fast-sanitizer-${{ steps.toolchain.outputs.sanitizer }}-${{ hashFiles('.github/workflows/pr-fast.yml', 'CMakeLists.txt', 'CMakePresets.json', 'cmake/**/*.cmake', 'tools/ci/ccache_ci.py', 'tools/ci/ccache_module_invalidation_probe.py', 'tools/setup/bootstrap_vcpkg.sh', 'tools/vcpkg/**', 'vcpkg.json', 'vcpkg-configuration.json') }}-${{ github.sha }}
          restore-keys: |
            ccache-v1-${{ runner.os }}-${{ runner.arch }}-pr-fast-${{ steps.toolchain.outputs.compiler-key }}-${{ steps.toolchain.outputs.scan-deps-key }}-${{ steps.toolchain.outputs.ccache-key }}-preset-ci-fast-sanitizer-${{ steps.toolchain.outputs.sanitizer }}-${{ hashFiles('.github/workflows/pr-fast.yml', 'CMakeLists.txt', 'CMakePresets.json', 'cmake/**/*.cmake', 'tools/ci/ccache_ci.py', 'tools/ci/ccache_module_invalidation_probe.py', 'tools/setup/bootstrap_vcpkg.sh', 'tools/vcpkg/**', 'vcpkg.json', 'vcpkg-configuration.json') }}-

      - name: Validate ccache pilot mode
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          python3 tools/ci/ccache_ci.py check-config \
            --build-dir build/ci-fast \
            --repo-root . \
            --expected-cache-dir "$CCACHE_DIR" \
            --expected-max-size "$INTRINSIC_CCACHE_MAXSIZE_DISPLAY"

      - name: Run module invalidation ccache probe
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          python3 tools/ci/ccache_module_invalidation_probe.py \
            --work-dir "$RUNNER_TEMP/intrinsic-ccache-module-probe" \
            --cxx '${{ steps.toolchain.outputs.compiler-path }}' \
            --scan-deps '${{ steps.toolchain.outputs.scan-deps-path }}' \
            --output build/ci-fast/ci-timing/ccache/module-invalidation-probe.json

      - name: Zero ccache stats
        if: steps.route.outputs.needs_cpp == 'true'
        run: ccache --zero-stats

      - name: Build selected test closure
        id: build
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          python3 tools/ci/time_command.py \
            --label "Build selected test closure" \
            --json-out build/ci-fast/ci-timing/phases/build.json \
            -- python3 tools/ci/touched_scope.py \
              --root . \
              --action build \
              --plan build/ci-fast/ci-routing/route.json \
              --build-dir build/ci-fast \
              --github-output "$GITHUB_OUTPUT" \
              --step-summary "$GITHUB_STEP_SUMMARY"

      - name: Collect ccache stats
        id: ccache-stats
        if: always() && steps.route.outputs.needs_cpp == 'true'
        run: |
          python3 tools/ci/ccache_ci.py write-stats \
            --output build/ci-fast/ci-timing/ccache/stats.json

      - name: Run selected tests
        id: test
        if: steps.route.outputs.needs_cpp == 'true'
        run: |
          python3 tools/ci/time_command.py \
            --label "Run selected tests" \
            --json-out build/ci-fast/ci-timing/phases/test.json \
            -- python3 tools/ci/touched_scope.py \
              --root . \
              --action test \
              --plan build/ci-fast/ci-routing/route.json \
              --build-dir build/ci-fast \
              --github-output "$GITHUB_OUTPUT" \
              --step-summary "$GITHUB_STEP_SUMMARY"

      - name: Aggregate gate timing result
        if: always() && steps.route.outputs.needs_cpp == 'true'
        run: |
          context_args=()
          cache_state=cold
          if [ -n '${{ steps.ccache-restore.outputs.cache-matched-key }}' ]; then
            cache_state=warm
          fi
          if [ -n '${{ steps.test.outputs.selected_test_count }}' ]; then
            context_args+=(--selected-test-count '${{ steps.test.outputs.selected_test_count }}')
          fi
          if [ -n '${{ steps.build.outputs.ninja_edge_count }}' ]; then
            context_args+=(--ninja-edge-count '${{ steps.build.outputs.ninja_edge_count }}')
          fi
          python3 tools/ci/aggregate_gate_timing.py \
            --configure-json build/ci-fast/ci-timing/phases/configure.json \
            --build-json build/ci-fast/ci-timing/phases/build.json \
            --test-json build/ci-fast/ci-timing/phases/test.json \
            --gate pr-fast \
            --preset ci-fast \
            --build-dir build/ci-fast \
            --compiler '${{ steps.toolchain.outputs.compiler }}' \
            --sanitizer '${{ steps.toolchain.outputs.sanitizer }}' \
            --runner-image ubuntu-24.04 \
            --commit '${{ github.sha }}' \
            --cache-state "$cache_state" \
            --ccache-stats-json build/ci-fast/ci-timing/ccache/stats.json \
            --require-ccache-stats \
            --vcpkg-cache-hit '${{ steps.vcpkg-cache.outputs.cache-hit }}' \
            --job-url 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            "${context_args[@]}" \
            --output build/ci-fast/ci-timing/result/result.json

      - name: Validate gate timing result
        if: always() && steps.route.outputs.needs_cpp == 'true'
        run: python3 tools/benchmark/validate_benchmark_results.py --root build/ci-fast/ci-timing/result --strict

      - name: Upload gate timing result
        if: always() && steps.route.outputs.needs_cpp == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-timing-pr-fast
          path: build/ci-fast/ci-timing/result/result.json
          if-no-files-found: error

      - name: Upload module invalidation probe result
        if: always() && steps.route.outputs.needs_cpp == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ci-ccache-module-invalidation-pr-fast
          path: build/ci-fast/ci-timing/ccache/module-invalidation-probe.json
          if-no-files-found: error

      - name: Save validated ccache store
        if: success() && steps.route.outputs.needs_cpp == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

      - name: Upload touched-scope route
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-pr-fast-touched-scope-route
          path: build/ci-fast/ci-routing/
          if-no-files-found: error
