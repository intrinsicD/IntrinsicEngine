project:
  name: IntrinsicEngine
  language: cpp
  standard: c++23
  build_system: cmake

workflow:
  verification_command: "cmake --preset ci && cmake --build --preset ci --target IntrinsicTests && ctest --test-dir build/ci --output-on-failure -LE 'gpu|vulkan|slow|flaky-quarantine' --timeout 60"
  instruction_file: "AGENTS.md"

ignore:
  - "build/**"
  - "external/**"
  - ".git/**"

agent:
  reasoning_effort: xhigh
  enable_compaction: true
